<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Factura</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#1e1e2f,#2c2c54);
margin:0;
padding:30px;
}

.factura{
max-width:850px;
margin:auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
position:relative;
}

.logo{text-align:center}

.logo img{
width:120px;
}

h2{text-align:center}

.info{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.agregar{background:#28a745;color:white}

.imprimir{
background:#007bff;
color:white;
margin-top:20px;
width:100%;
}

.ajustes-btn{
position:absolute;
top:10px;
right:10px;
background:#444;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#222;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.derecha{text-align:right}

.resumen{margin-top:20px}

.total{
font-size:22px;
font-weight:bold;
}

.form-producto{
display:flex;
gap:10px;
margin-bottom:20px;
}

.form-producto input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
}

.toggle{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.switch{
width:50px;
height:25px;
background:#ccc;
border-radius:20px;
position:relative;
cursor:pointer;
}

.switch::after{
content:'';
width:20px;
height:20px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:2px;
transition:0.3s;
}

.switch.active{
background:#28a745;
}

.switch.active::after{
left:27px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:350px;
}

.modal input{
width:100%;
padding:8px;
margin-bottom:10px;
}

/* impresión */

@media print{

body{background:white}

.ajustes-btn,
.form-producto,
.agregar,
.imprimir,
.toggle{
display:none;
}

.factura{
box-shadow:none;
padding:10px;
}

th,td{
font-size:16px;
}

.total{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="factura">

<button class="ajustes-btn" onclick="abrirAjustes()">⚙ Ajustes</button>

<div class="logo">
<img id="logoImg" src="" alt="logo">
</div>

<h2 id="empresaNombre">JeanSkirt</h2>

<div class="info">
<div><strong>Factura No:</strong> <span id="numeroFactura"></span></div>
<div><strong>Fecha:</strong> <span id="fecha"></span></div>
</div>

<!-- CLIENTE -->

<div class="toggle">
Cliente
<div id="toggleCliente" class="switch"></div>
</div>

<div id="clienteArea" style="display:none">

<input id="clienteNombre" placeholder="Nombre del cliente">

<div class="toggle">
Empresa
<div id="toggleEmpresa" class="switch"></div>
</div>

<div id="rncMostrar" style="display:none">
<strong>RNC:</strong> <span id="rncTexto"></span>
</div>

</div>

<!-- PRODUCTOS -->

<div class="form-producto">

<input id="nombre" placeholder="Producto">
<input id="cantidad" type="number" placeholder="Cantidad">
<input id="precio" type="number" placeholder="Precio">

<button class="agregar" onclick="agregarProducto()">Agregar</button>

</div>

<table>

<thead>
<tr>
<th>Producto</th>
<th class="derecha">Cant</th>
<th class="derecha">P.Unit</th>
<th class="derecha">Total</th>
</tr>
</thead>

<tbody id="tablaProductos"></tbody>

</table>

<table class="resumen">

<tr>
<td></td>
<td class="derecha">Subtotal</td>
<td class="derecha" id="subtotal">RD$0</td>
</tr>

<tr id="filaItbis">
<td></td>
<td class="derecha">ITBIS</td>
<td class="derecha" id="itbis">RD$0</td>
</tr>

<tr class="total">
<td></td>
<td class="derecha">Total</td>
<td class="derecha" id="total">RD$0</td>
</tr>

</table>

<button class="imprimir" onclick="window.print()">Imprimir</button>

</div>

<!-- MODAL AJUSTES -->

<div class="modal" id="modalAjustes">

<div class="modal-content">

<h3>Ajustes</h3>

<label>Nombre empresa</label>
<input id="empresaInput">

<label>RNC</label>
<input id="rncInput">

<label>Logo</label>
<input type="file" id="logoInput">

<div style="border:2px dashed #ccc;padding:20px;text-align:center;margin-bottom:10px" id="dropArea">
Arrastra logo aquí
</div>

<div class="toggle">
ITBIS
<div id="toggleItbis" class="switch"></div>
</div>

<button onclick="guardarAjustes()">Guardar</button>

</div>

</div>

<script>

/* numero factura */

const now=new Date()

numeroFactura.textContent="JS-"+now.getTime()
fecha.textContent=now.toLocaleDateString("es-DO")

let totalGeneral=0

function agregarProducto(){

const nombre=document.getElementById("nombre").value
const cantidad=parseFloat(document.getElementById("cantidad").value)
const precio=parseFloat(document.getElementById("precio").value)

if(!nombre||!cantidad||!precio)return

const total=cantidad*precio
totalGeneral+=total

tablaProductos.innerHTML+=`
<tr>
<td>${nombre}</td>
<td class="derecha">${cantidad}</td>
<td class="derecha">RD$${precio.toFixed(2)}</td>
<td class="derecha">RD$${total.toFixed(2)}</td>
</tr>`

calcular()

nombre.value=""
cantidad.value=""
precio.value=""

}

function calcular(){

if(config.itbis){

const subtotal=totalGeneral/1.18
const itbis=totalGeneral-subtotal

subtotalEl.textContent="RD$"+subtotal.toFixed(2)
itbisEl.textContent="RD$"+itbis.toFixed(2)

}else{

subtotalEl.textContent="RD$"+totalGeneral.toFixed(2)
itbisEl.textContent="RD$0"

}

totalEl.textContent="RD$"+totalGeneral.toFixed(2)

}

/* ajustes */

let config=JSON.parse(localStorage.getItem("config"))||{
empresa:"JeanSkirt",
rnc:"",
itbis:true,
logo:""
}

function cargarConfig(){

empresaNombre.textContent=config.empresa
empresaInput.value=config.empresa
rncInput.value=config.rnc
rncTexto.textContent=config.rnc

if(config.logo)logoImg.src=config.logo

if(config.itbis)toggleItbis.classList.add("active")

}

function guardarAjustes(){

config.empresa=empresaInput.value
config.rnc=rncInput.value
config.itbis=toggleItbis.classList.contains("active")

localStorage.setItem("config",JSON.stringify(config))

cargarConfig()

modalAjustes.style.display="none"

}

function abrirAjustes(){
modalAjustes.style.display="flex"
}

/* toggle */

function toggle(el){
el.classList.toggle("active")
}

toggleCliente.onclick=()=>{
toggle(toggleCliente)
clienteArea.style.display=toggleCliente.classList.contains("active")?"block":"none"
}

toggleEmpresa.onclick=()=>{
toggle(toggleEmpresa)
rncMostrar.style.display=toggleEmpresa.classList.contains("active")?"block":"none"
}

toggleItbis.onclick=()=>toggle(toggleItbis)

/* logo */

logoInput.onchange=e=>{
const file=e.target.files[0]
const reader=new FileReader()
reader.onload=function(){
config.logo=reader.result
logoImg.src=reader.result
}
reader.readAsDataURL(file)
}

dropArea.ondragover=e=>e.preventDefault()

dropArea.ondrop=e=>{
e.preventDefault()
const file=e.dataTransfer.files[0]
const reader=new FileReader()
reader.onload=function(){
config.logo=reader.result
logoImg.src=reader.result
}
reader.readAsDataURL(file)
}

const subtotalEl=document.getElementById("subtotal")
const itbisEl=document.getElementById("itbis")
const totalEl=document.getElementById("total")

cargarConfig()

</script>

</body>
</html>
