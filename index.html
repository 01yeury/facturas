<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FactuApp</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f4f6fb;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input,button,select{
padding:10px;
margin:5px 0;
width:100%;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginView" class="card">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Entrar</button>
<button onclick="signup()">Crear Cuenta</button>

<p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="appView" class="hidden">

<div class="card">
<h2>Dashboard</h2>

<p id="planText"></p>
<p id="limitText"></p>

<button onclick="showSection('invoice')">Nueva Factura</button>
<button onclick="showSection('client')">Clientes</button>
<button onclick="showSection('product')">Productos</button>
<button onclick="logout()">Cerrar sesión</button>

</div>

<!-- CLIENT -->
<div id="clientSection" class="card hidden">
<h3>Crear Cliente</h3>
<input id="clientName" placeholder="Nombre">
<input id="clientRnc" placeholder="RNC">

<button onclick="saveClient()">Guardar Cliente</button>
</div>

<!-- PRODUCT -->
<div id="productSection" class="card hidden">
<h3>Crear Producto</h3>
<input id="prodName" placeholder="Nombre">
<input id="prodPrice" type="number" placeholder="Precio">

<button onclick="saveProduct()">Guardar Producto</button>
</div>

<!-- INVOICE -->
<div id="invoiceSection" class="card hidden">

<h3>Nueva Factura</h3>

<input id="invoiceNumber" placeholder="Número factura">
<input id="invoiceClient" placeholder="Nombre Cliente">

<input id="itemDesc" placeholder="Descripción">
<input id="itemQty" type="number" placeholder="Cantidad">
<input id="itemPrice" type="number" placeholder="Precio">

<button onclick="addItem()">Agregar Item</button>

<div id="items"></div>

<h4 id="totalText">Total: 0</h4>

<button onclick="printInvoice()">Imprimir y Guardar</button>

</div>

</div>

</div>

<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
"https://exiedneezuzkdqfeqxlq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4aWVkbmVlenV6a2RxZmVxeGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTAxODAsImV4cCI6MjA4ODU4NjE4MH0.bVV5mlGZURw_H-xw0kVN9dI8jQ4NN9dgPQ9HlN4krEY"
)

let user=null
let items=[]
let total=0

window.showSection=(s)=>{
document.getElementById("clientSection").classList.add("hidden")
document.getElementById("productSection").classList.add("hidden")
document.getElementById("invoiceSection").classList.add("hidden")

if(s==="client") document.getElementById("clientSection").classList.remove("hidden")
if(s==="product") document.getElementById("productSection").classList.remove("hidden")
if(s==="invoice") document.getElementById("invoiceSection").classList.remove("hidden")
}

window.signup=async()=>{
let email=document.getElementById("email").value
let password=document.getElementById("password").value

let {data,error}=await supabase.auth.signUp({email,password})

if(error) return alert(error.message)

alert("Cuenta creada")
}

window.login=async()=>{
let email=document.getElementById("email").value
let password=document.getElementById("password").value

let {data,error}=await supabase.auth.signInWithPassword({email,password})

if(error) return alert(error.message)

user=data.user

document.getElementById("loginView").classList.add("hidden")
document.getElementById("appView").classList.remove("hidden")

loadPlan()
}

window.logout=async()=>{
await supabase.auth.signOut()
location.reload()
}

async function loadPlan(){

let {data}=await supabase
.from("profiles")
.select("plan")
.eq("id",user.id)
.single()

let plan=data?.plan || "basic"

document.getElementById("planText").innerText="Plan: "+plan

let {count}=await supabase
.from("invoices")
.select("*",{count:"exact",head:true})
.eq("user_id",user.id)

let remain=10-count

if(plan==="premium") remain="Ilimitadas"

document.getElementById("limitText").innerText="Facturas disponibles: "+remain

}

window.saveClient=async()=>{
await supabase.from("clients").insert({
user_id:user.id,
name:document.getElementById("clientName").value,
rnc:document.getElementById("clientRnc").value
})
alert("Cliente guardado")
}

window.saveProduct=async()=>{
await supabase.from("products").insert({
user_id:user.id,
name:document.getElementById("prodName").value,
price:document.getElementById("prodPrice").value
})
alert("Producto guardado")
}

window.addItem=()=>{
let desc=document.getElementById("itemDesc").value
let qty=Number(document.getElementById("itemQty").value)
let price=Number(document.getElementById("itemPrice").value)

let line=qty*price

items.push({desc,qty,price,line})

total+=line

renderItems()
}

function renderItems(){
let div=document.getElementById("items")
div.innerHTML=""

items.forEach(i=>{
div.innerHTML+=i.desc+" - "+i.line+"<br>"
})

document.getElementById("totalText").innerText="Total: "+total
}

window.printInvoice=async()=>{

let {data}=await supabase
.from("profiles")
.select("plan")
.eq("id",user.id)
.single()

let plan=data.plan

if(plan==="basic"){

let {count}=await supabase
.from("invoices")
.select("*",{count:"exact",head:true})
.eq("user_id",user.id)

if(count>=10){
alert("Limite alcanzado")
return
}

}

let {data:inv}=await supabase
.from("invoices")
.insert({
user_id:user.id,
invoice_number:document.getElementById("invoiceNumber").value,
client_name:document.getElementById("invoiceClient").value,
total:total
})
.select()
.single()

let invoiceId=inv.id

for(let i of items){

await supabase.from("invoice_items").insert({
invoice_id:invoiceId,
description:i.desc,
quantity:i.qty,
unit_price:i.price,
line_total:i.line
})

}

window.print()

alert("Factura guardada")

items=[]
total=0
renderItems()

}

</script>

</body>
</html>
