<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factura</title>

<style>
body{
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#1e1e2f,#2c2c54);
margin:0;
padding:30px;
box-sizing:border-box;
}

*{
box-sizing:border-box;
}

.auth-box{
max-width:420px;
margin:40px auto;
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

.auth-box h2{
margin-top:0;
text-align:center;
}

.auth-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:10px;
font-size:15px;
}

.auth-actions{
display:flex;
gap:10px;
}

.auth-actions button{
flex:1;
}

#authMsg{
margin-top:10px;
font-size:14px;
min-height:20px;
}

.factura{
max-width:850px;
margin:auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
position:relative;
display:none;
}

.top-actions{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.top-actions-left,
.top-actions-right{
display:flex;
gap:10px;
align-items:center;
}

.logo{
text-align:center;
}

.logo img{
width:120px;
max-width:100%;
object-fit:contain;
}

h2{
text-align:center;
margin:12px 0 20px 0;
word-break:break-word;
}

.info{
display:flex;
justify-content:space-between;
gap:16px;
margin-bottom:20px;
flex-wrap:wrap;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

.agregar{
background:#28a745;
color:white;
white-space:nowrap;
}

.imprimir{
background:#007bff;
color:white;
margin-top:20px;
width:100%;
}

.ajustes-btn{
background:#444;
color:white;
}

.salir-btn{
background:#b42318;
color:white;
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th{
background:#222;
color:white;
padding:10px;
font-size:14px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:14px;
word-wrap:break-word;
}

.derecha{
text-align:right;
}

.resumen{
margin-top:20px;
}

.total{
font-size:22px;
font-weight:bold;
}

.form-producto{
display:flex;
gap:10px;
margin-bottom:20px;
align-items:stretch;
}

.form-producto input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
font-size:14px;
min-width:0;
}

#clienteArea input,
.modal input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
width:100%;
}

.toggle{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
flex-wrap:wrap;
}

.switch{
width:50px;
height:25px;
background:#ccc;
border-radius:20px;
position:relative;
cursor:pointer;
flex-shrink:0;
}

.switch::after{
content:'';
width:20px;
height:20px;
background:white;
border-radius:50%;
position:absolute;
top:2px;
left:2px;
transition:0.3s;
}

.switch.active{
background:#28a745;
}

.switch.active::after{
left:27px;
}

.cliente-resumen{
margin:10px 0 18px 0;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
background:#fafafa;
display:none;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
padding:16px;
z-index:999;
}

.modal-content{
background:white;
padding:30px;
border-radius:10px;
width:350px;
max-width:100%;
max-height:90vh;
overflow:auto;
}

.modal input{
margin-bottom:10px;
}

#dropArea{
border:2px dashed #ccc;
padding:20px;
text-align:center;
margin-bottom:10px;
border-radius:8px;
word-break:break-word;
}

/* ===== MOBILE UX ===== */
@media (max-width:700px){

body{
padding:10px;
}

.auth-box{
margin:10px auto;
padding:18px;
}

.auth-actions{
flex-direction:column;
}

.factura{
padding:18px;
border-radius:10px;
}

.logo img{
width:85px;
}

h2{
font-size:20px;
margin-top:18px;
margin-bottom:16px;
}

.info{
flex-direction:column;
gap:6px;
font-size:15px;
}

.top-actions{
flex-direction:column;
align-items:stretch;
}

.top-actions-left,
.top-actions-right{
width:100%;
justify-content:space-between;
}

.form-producto{
flex-direction:column;
gap:8px;
}

.form-producto input{
font-size:16px;
padding:12px;
}

.agregar{
width:100%;
padding:12px;
font-size:16px;
}

table{
font-size:14px;
}

th{
font-size:13px;
padding:8px 6px;
}

td{
padding:8px 6px;
font-size:13px;
}

.resumen td{
font-size:15px;
}

.total{
font-size:20px;
}

.imprimir{
padding:14px;
font-size:16px;
}

.ajustes-btn,
.salir-btn{
padding:8px 10px;
font-size:13px;
}

.toggle{
font-size:15px;
}

.switch{
transform:scale(0.95);
transform-origin:left center;
}

.modal-content{
padding:20px;
width:100%;
}

#clienteArea input,
.modal input{
font-size:16px;
}

}

/* impresión */
@media print{

body{
background:white;
padding:0;
}

.auth-box,
.top-actions,
.form-producto,
.agregar,
.imprimir,
.toggle,
#clienteArea{
display:none !important;
}

.factura{
display:block !important;
box-shadow:none;
padding:10px;
border-radius:0;
max-width:none;
}

.cliente-resumen{
display:block !important;
}

th,td{
font-size:16px;
}

.total{
font-size:22px;
}

}
</style>
</head>
<body>

<div id="loginBox" class="auth-box">
  <h2>Iniciar sesión</h2>
  <input id="authEmail" type="email" placeholder="Correo">
  <input id="authPassword" type="password" placeholder="Contraseña">

  <div class="auth-actions">
    <button type="button" onclick="registerUser()">Crear cuenta</button>
    <button type="button" onclick="loginUser()">Entrar</button>
  </div>

  <p id="authMsg"></p>
</div>

<div class="factura" id="facturaBox">

  <div class="top-actions">
    <div class="top-actions-left">
      <button class="ajustes-btn" type="button" onclick="abrirAjustes()">⚙ Ajustes</button>
    </div>
    <div class="top-actions-right">
      <button class="salir-btn" type="button" onclick="logoutUser()">Salir</button>
    </div>
  </div>

  <div class="logo">
    <img id="logoImg" src="" alt="logo">
  </div>

  <h2 id="empresaNombre">JeanSkirt</h2>

  <div class="info">
    <div><strong>Factura No:</strong> <span id="numeroFactura"></span></div>
    <div><strong>Fecha:</strong> <span id="fecha"></span></div>
  </div>

  <!-- CLIENTE -->
  <div class="toggle">
    <span>Cliente</span>
    <div id="toggleCliente" class="switch"></div>
  </div>

  <div id="clienteArea" style="display:none">
    <input id="clienteNombre" placeholder="Nombre del cliente">

    <div class="toggle">
      <span>Empresa</span>
      <div id="toggleEmpresa" class="switch"></div>
    </div>

    <div id="rncMostrar" style="display:none">
      <strong>RNC:</strong> <span id="rncTexto"></span>
    </div>
  </div>

  <div id="clienteResumen" class="cliente-resumen"></div>

  <!-- PRODUCTOS -->
  <div class="form-producto">
    <input id="nombre" placeholder="Producto">
    <input id="cantidad" type="number" placeholder="Cantidad" min="1" step="1">
    <input id="precio" type="number" placeholder="Precio" min="0" step="0.01">
    <button class="agregar" type="button" onclick="agregarProducto()">Agregar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Producto</th>
        <th class="derecha">Cant</th>
        <th class="derecha">P.Unit</th>
        <th class="derecha">Total</th>
      </tr>
    </thead>
    <tbody id="tablaProductos"></tbody>
  </table>

  <table class="resumen">
    <tr>
      <td></td>
      <td class="derecha">Subtotal</td>
      <td class="derecha" id="subtotal">RD$0.00</td>
    </tr>

    <tr id="filaItbis">
      <td></td>
      <td class="derecha">ITBIS</td>
      <td class="derecha" id="itbis">RD$0.00</td>
    </tr>

    <tr class="total">
      <td></td>
      <td class="derecha">Total</td>
      <td class="derecha" id="total">RD$0.00</td>
    </tr>
  </table>

  <button class="imprimir" type="button" onclick="window.print()">Imprimir</button>
</div>

<!-- MODAL AJUSTES -->
<div class="modal" id="modalAjustes">
  <div class="modal-content">
    <h3>Ajustes</h3>

    <label for="empresaInput">Nombre empresa</label>
    <input id="empresaInput">

    <label for="rncInput">RNC</label>
    <input id="rncInput">

    <label for="logoInput">Logo</label>
    <input type="file" id="logoInput" accept="image/*">

    <div id="dropArea">Arrastra logo aquí</div>

    <div class="toggle">
      <span>ITBIS</span>
      <div id="toggleItbis" class="switch"></div>
    </div>

    <button type="button" onclick="guardarAjustes()">Guardar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://exiedneezuzkdqfeqxlq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4aWVkbmVlenV6a2RxZmVxeGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTAxODAsImV4cCI6MjA4ODU4NjE4MH0.bVV5mlGZURw_H-xw0kVN9dI8jQ4NN9dgPQ9HlN4krEY";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const numeroFactura = document.getElementById("numeroFactura");
const fecha = document.getElementById("fecha");
const empresaNombre = document.getElementById("empresaNombre");
const empresaInput = document.getElementById("empresaInput");
const rncInput = document.getElementById("rncInput");
const rncTexto = document.getElementById("rncTexto");
const logoImg = document.getElementById("logoImg");
const logoInput = document.getElementById("logoInput");
const dropArea = document.getElementById("dropArea");
const modalAjustes = document.getElementById("modalAjustes");
const toggleCliente = document.getElementById("toggleCliente");
const toggleEmpresa = document.getElementById("toggleEmpresa");
const toggleItbis = document.getElementById("toggleItbis");
const clienteArea = document.getElementById("clienteArea");
const rncMostrar = document.getElementById("rncMostrar");
const subtotalEl = document.getElementById("subtotal");
const itbisEl = document.getElementById("itbis");
const totalEl = document.getElementById("total");
const filaItbis = document.getElementById("filaItbis");
const tablaProductos = document.getElementById("tablaProductos");
const loginBox = document.getElementById("loginBox");
const facturaBox = document.getElementById("facturaBox");
const authMsg = document.getElementById("authMsg");
const clienteNombre = document.getElementById("clienteNombre");
const clienteResumen = document.getElementById("clienteResumen");

let currentUser = null;
let totalGeneral = 0;

let config = {
  empresa: "JeanSkirt",
  rnc: "",
  itbis: true,
  logo: ""
};

function resetFacturaMeta(){
  const now = new Date();
  numeroFactura.textContent = "JS-" + now.getTime();
  fecha.textContent = now.toLocaleDateString("es-DO");
}

resetFacturaMeta();

function toggle(el){
  el.classList.toggle("active");
}

function updateClienteResumen(){
  if(!toggleCliente.classList.contains("active")){
    clienteResumen.style.display = "none";
    clienteResumen.innerHTML = "";
    return;
  }

  const nombre = clienteNombre.value.trim();
  const esEmpresa = toggleEmpresa.classList.contains("active");

  if(!nombre){
    clienteResumen.style.display = "none";
    clienteResumen.innerHTML = "";
    return;
  }

  if(esEmpresa){
    clienteResumen.innerHTML = `<strong>Cliente:</strong> ${nombre}<br><strong>RNC:</strong> ${config.rnc || ""}`;
  } else {
    clienteResumen.innerHTML = `<strong>Cliente:</strong> ${nombre}`;
  }

  clienteResumen.style.display = "block";
}

function agregarProducto(){
  const nombreInput = document.getElementById("nombre");
  const cantidadInput = document.getElementById("cantidad");
  const precioInput = document.getElementById("precio");

  const nombre = nombreInput.value.trim();
  const cantidad = parseFloat(cantidadInput.value);
  const precio = parseFloat(precioInput.value);

  if(!nombre || isNaN(cantidad) || isNaN(precio) || cantidad <= 0 || precio < 0) return;

  const total = cantidad * precio;
  totalGeneral += total;

  tablaProductos.innerHTML += `
  <tr>
    <td>${nombre}</td>
    <td class="derecha">${cantidad}</td>
    <td class="derecha">RD$${precio.toFixed(2)}</td>
    <td class="derecha">RD$${total.toFixed(2)}</td>
  </tr>`;

  calcular();

  nombreInput.value = "";
  cantidadInput.value = "";
  precioInput.value = "";
  nombreInput.focus();
}

function calcular(){
  if(config.itbis){
    const subtotal = totalGeneral / 1.18;
    const itbis = totalGeneral - subtotal;

    subtotalEl.textContent = "RD$" + subtotal.toFixed(2);
    itbisEl.textContent = "RD$" + itbis.toFixed(2);
    filaItbis.style.display = "";
  } else {
    subtotalEl.textContent = "RD$" + totalGeneral.toFixed(2);
    itbisEl.textContent = "RD$0.00";
    filaItbis.style.display = "none";
  }

  totalEl.textContent = "RD$" + totalGeneral.toFixed(2);
}

function cargarConfig(){
  empresaNombre.textContent = config.empresa || "JeanSkirt";
  empresaInput.value = config.empresa || "JeanSkirt";
  rncInput.value = config.rnc || "";
  rncTexto.textContent = config.rnc || "";
  logoImg.src = config.logo || "";

  toggleItbis.classList.toggle("active", !!config.itbis);
  updateClienteResumen();
  calcular();
}

async function ensureProfile(user){
  const { data, error } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  if(error){
    console.error(error);
    return null;
  }

  if(!data){
    const defaultProfile = {
      id: user.id,
      email: user.email,
      empresa: "JeanSkirt",
      rnc: "",
      itbis: true,
      logo: ""
    };

    const { error: insertError } = await supabaseClient
      .from("profiles")
      .insert(defaultProfile);

    if(insertError){
      console.error(insertError);
      return null;
    }

    return defaultProfile;
  }

  return data;
}

async function loadUserProfile(){
  const { data: userData, error: userError } = await supabaseClient.auth.getUser();

  if(userError || !userData?.user){
    return;
  }

  currentUser = userData.user;

  const profile = await ensureProfile(currentUser);
  if(!profile) return;

  config.empresa = profile.empresa || "JeanSkirt";
  config.rnc = profile.rnc || "";
  config.itbis = typeof profile.itbis === "boolean" ? profile.itbis : true;
  config.logo = profile.logo || "";

  cargarConfig();

  loginBox.style.display = "none";
  facturaBox.style.display = "block";
}

async function registerUser(){
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value.trim();

  if(!email || !password){
    authMsg.textContent = "Completa correo y contraseña.";
    return;
  }

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  authMsg.textContent = error
    ? error.message
    : "Cuenta creada. Si Supabase pide confirmación, revisa tu correo.";
}

async function loginUser(){
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value.trim();

  if(!email || !password){
    authMsg.textContent = "Completa correo y contraseña.";
    return;
  }

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    authMsg.textContent = error.message;
    return;
  }

  authMsg.textContent = "Sesión iniciada.";
  await loadUserProfile();
}

async function logoutUser(){
  await supabaseClient.auth.signOut();
  currentUser = null;
  loginBox.style.display = "block";
  facturaBox.style.display = "none";
  authMsg.textContent = "Sesión cerrada.";
}

async function guardarAjustes(){
  config.empresa = empresaInput.value.trim() || "JeanSkirt";
  config.rnc = rncInput.value.trim();
  config.itbis = toggleItbis.classList.contains("active");

  if(currentUser){
    const { error } = await supabaseClient
      .from("profiles")
      .upsert({
        id: currentUser.id,
        email: currentUser.email,
        empresa: config.empresa,
        rnc: config.rnc,
        itbis: config.itbis,
        logo: config.logo || ""
      });

    if(error){
      console.error(error);
      return;
    }
  }

  cargarConfig();
  modalAjustes.style.display = "none";
}

function abrirAjustes(){
  modalAjustes.style.display = "flex";
}

toggleCliente.onclick = () => {
  toggle(toggleCliente);
  clienteArea.style.display = toggleCliente.classList.contains("active") ? "block" : "none";

  if(!toggleCliente.classList.contains("active")){
    toggleEmpresa.classList.remove("active");
    rncMostrar.style.display = "none";
  }

  updateClienteResumen();
};

toggleEmpresa.onclick = () => {
  if(!toggleCliente.classList.contains("active")) return;
  toggle(toggleEmpresa);
  rncMostrar.style.display = toggleEmpresa.classList.contains("active") ? "block" : "none";
  updateClienteResumen();
};

toggleItbis.onclick = () => {
  toggle(toggleItbis);
  config.itbis = toggleItbis.classList.contains("active");
  calcular();
};

clienteNombre.addEventListener("input", updateClienteResumen);

logoInput.onchange = e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(){
    config.logo = reader.result;
    logoImg.src = reader.result;
  };
  reader.readAsDataURL(file);
};

dropArea.ondragover = e => e.preventDefault();

dropArea.ondrop = e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(){
    config.logo = reader.result;
    logoImg.src = reader.result;
  };
  reader.readAsDataURL(file);
};

modalAjustes.addEventListener("click", (e) => {
  if(e.target === modalAjustes){
    modalAjustes.style.display = "none";
  }
});

supabaseClient.auth.onAuthStateChange(async (_event, session) => {
  if(session?.user){
    await loadUserProfile();
  }
});

loadUserProfile();
</script>

</body>
</html>
